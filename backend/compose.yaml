services:
  web:
    build: .
    command: gunicorn dopios_backend.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    depends_on:
      - db
    volumes:
      - penguinos_static:/app/staticfiles

  db:
    image: postgres:18
    volumes:
      - penguinos_postgres_data:/var/lib/postgresql
    env_file:
      - .env.production

volumes:
  penguinos_postgres_data:
  penguinos_static:
