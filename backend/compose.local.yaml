# This is an override file, base is `compose.yaml`
services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    depends_on:
      - db

  db:
    image: postgres:18
    volumes:
      - penguinos_postgres_data:/var/lib/postgresql
    env_file:
      - .env.local

volumes:
  penguinos_postgres_data:
